<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DavidsIndexer</title>
  <style>
    body{font-family:Segoe UI,Arial,sans-serif;margin:16px;line-height:1.4}
    textarea,input{width:100%;box-sizing:border-box;margin:6px 0 12px}
    .row{display:flex;gap:8px}.row>*{flex:1}
    .status{padding:8px;border:1px solid #ddd;background:#fafafa;margin:10px 0}
    button{padding:8px 12px;margin-right:8px}
    .small{font-size:12px;color:#555}
  </style>
</head>
<body>
  <h2>DavidsIndexer</h2>
  <div class="status" id="status">Ready.</div>
  <div id="progress" class="small"></div>
  <label>Exclude words (one per line)</label>
  <textarea id="excludeWords" rows="8"></textarea>
  <label>Include words (one per line)</label>
  <textarea id="includeWords" rows="6"></textarea>
  <label>Include phrases (one per line)</label>
  <textarea id="includePhrases" rows="8"></textarea>
  <div class="row">
    <button id="saveBtn">Save cached settings</button>
    <button id="reloadBtn">Reload sample config</button>
  </div>
  <p class="small">This scaffold stores cached settings in Office document settings during testing. Local file integration is represented by the sample config workflow.</p>
  <script src="taskpane.js"></script>
</body>
</html>
